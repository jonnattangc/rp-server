server {
    listen      80;
    listen      [::]:80;
    server_name www.jonna.cl;
    return 301  https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen      80;
    listen      [::]:80;
    server_name api.jonna.cl;
    return 301  https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen      80;
    listen      [::]:80;
    server_name docs.jonna.cl;
    return 301  https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen      80;
    listen      [::]:80;
    server_name intranet.jonna.cl;
    return 301  https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen 443          ssl;
    listen [::]:443     ssl;
    server_name         www.jonna.cl;

    ssl_certificate     /etc/ssl/jonna_cl.crt;
    ssl_certificate_key /etc/ssl/jonna_cl.key;
    
    ssl_protocols       TLSv1.2 TLSv1.3;

    error_log           /var/log/nginx/jonna.cl.error.log;
    access_log          /var/log/nginx/jonna.cl.access.log detail; 

    error_page          500 502 503 504 /error.html;      
    error_page          404 /no_found.html;

    root                /var/www/html;
    index               index.html index.htm index.nginx-debian.html;

    location = /error.html {
        root /var/www/html;
        internal;
    }

    location = /no_found.html {
        root /var/www/html;
        internal;
    }

    location = /favicon.ico {
        root /var/www/html/jonnattan;
    }

    location / {
      proxy_pass_request_headers  on;
      proxy_pass                  http://web-site:8055/;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP  $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header            X-Forwarded-Proto https;
      proxy_set_header            X-Forwarded-Host $host;
      proxy_cache_bypass          $http_secret_header;
      add_header                  X-Cache-Status $upstream_cache_status;
    }

    location /ws {
      proxy_pass            http://web-site:8080;
      proxy_http_version    1.1;
      proxy_set_header      Upgrade $http_upgrade;
      proxy_set_header      Connection "upgrade";
      proxy_set_header      Host $host;
      proxy_cache_bypass    $http_upgrade;
      proxy_read_timeout    86400; # O un valor adecuado para WebSockets
    }

    location /tesorero {
      proxy_pass_request_headers  on;
      proxy_pass                  http://api-jonnattan:8085/tesorero;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP  $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header            X-Forwarded-Proto https;
      proxy_set_header            X-Forwarded-Host $host;
      proxy_cache_bypass          $http_secret_header;
      add_header                  X-Cache-Status $upstream_cache_status;
    }
}

server {
    listen 443          ssl;
    listen [::]:443     ssl;
    server_name         api.jonna.cl;

    ssl_certificate     /etc/ssl/jonna_cl.crt;
    ssl_certificate_key /etc/ssl/jonna_cl.key;

    ssl_protocols       TLSv1.2 TLSv1.3;

    error_log           /var/log/nginx/api_jonna_cl.error.log;
    access_log          /var/log/nginx/api_jonna_cl.access.log detail; 

    error_page 500 502 503 504 /error.html;      
    error_page 404 /no_found.html;

    root                /var/www/html;
    index               index.html index.htm index.nginx-debian.html;

    location = /error.html {
        root /var/www/html;
        internal;
    }

    location = /no_found.html {
        root /var/www/html;
        internal;
    }

    location = /favicon.ico {
        root /var/www/html/jonnattan;
    }

    location / {
        proxy_pass_request_headers  on;
        proxy_pass          http://api-jonnattan:8085;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host $host;
        proxy_set_header    X-Forwarded-Port $server_port;
    }

    location ^~ /oauth {
        proxy_pass_request_headers  on;
        proxy_pass          http://api-security:8080/oauth;
        proxy_set_header    Host $host;
        proxy_set_header    X-Real-IP $remote_addr;
        proxy_set_header    X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header    X-Forwarded-Proto $scheme;
        proxy_set_header    X-Forwarded-Host $host;
        proxy_set_header    X-Forwarded-Port $server_port;
    }

    location /llm {
        proxy_pass_request_headers          on;
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  https;
        proxy_set_header X-Forwarded-Host   $host;
        proxy_pass                          http://api-llm:8065/llm;
    }

    location ^~ /docs {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-docs:8095/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
    }

    location /email {
        proxy_pass_request_headers        on;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass  http://api-email:8070/email;
    }
    
    location ^~ /emulator {
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 65s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 65s;
        proxy_pass http://api-emulator:8050/emulator;
      }

    location ^~ /v2/emulator {
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 65s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 65s;
        proxy_pass http://lenovo:8050/emulator;
    }
}

