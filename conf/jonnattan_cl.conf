server {
    listen      80;
    listen      [::]:80;
    server_name www.jonnattan.cl;
    
    error_log           /var/log/nginx/jonnattan_cl.error.log;
    access_log          /var/log/nginx/jonnattan_cl.access.log detail; 
    
    error_page          500 502 503 504 /error.html;  
    error_page          404 /no_found.html;    

    root                /var/www/html;
    index               index.html index.htm index.nginx-debian.html;

    location = /error.html {
          root /var/www/html;
          internal;
    }

    location = /no_found.html {
      root /var/www/html;
      internal;
    }

    location = /favicon.ico {
      root /var/www/html/jonnattan;
    }

    location / {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8055/;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP  $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header            X-Forwarded-Proto https;
      proxy_set_header            X-Forwarded-Host $host;
      proxy_cache_bypass          $http_secret_header;
      add_header                  X-Cache-Status $upstream_cache_status;
    }

    location /ws {
      proxy_pass                  http://mini.jonnattan:8055;
      proxy_http_version          1.1;
      proxy_set_header            Upgrade $http_upgrade;
      proxy_set_header            Connection "upgrade";
      proxy_set_header            Host $host;
      proxy_cache_bypass          $http_upgrade;
      proxy_read_timeout          86400; # O un valor adecuado para WebSockets
    }

    location /tesorero {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8085/tesorero;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP  $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header            X-Forwarded-Proto https;
      proxy_set_header            X-Forwarded-Host $host;
      proxy_cache_bypass          $http_secret_header;
      add_header                  X-Cache-Status $upstream_cache_status;
    }
}

server {
    listen              80;
    listen              [::]:80;
    server_name         docs.jonnattan.cl;

    error_log           /var/log/nginx/docs_jonnattan.cl.error.log;
    access_log          /var/log/nginx/docs_jonnattan.cl.access.log detail; 

    error_page          500 502 503 504 /error.html;      
    error_page          404 /no_found.html;

    root                /var/www/html;
    index               index.html index.htm index.nginx-debian.html;

    location = /error.html {
        root /var/www/html;
        internal;
    }

    location = /no_found.html {
        root /var/www/html;
        internal;
    }

    location = /favicon.ico {
        root /var/www/html/jonnattan;
    }
}

