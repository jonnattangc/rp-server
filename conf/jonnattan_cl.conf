# Configuración de servidores de esta maquina. Actualmente son 3 dominios
server {
    listen 80;
    listen [::]:80;
    server_name  api.jonnattan.cl;
    return 301 https://$host$request_uri;

    location /.well-known/pki-validation/7BBB279398C353841283F7492DFCE164.txt {
      root /var/www/html;
      index .well-known/pki-validation/7BBB279398C353841283F7492DFCE164.txt;
    }

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen      80;
    listen      [::]:80;
    server_name www.jonnattan.cl;
    return 301  https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
      listen 443          ssl;
      listen [::]:443     ssl;
      server_name         api.jonnattan.cl;
      ssl_certificate     /etc/ssl/api_jonnattan_cl.crt;
      ssl_certificate_key /etc/ssl/api_jonnattan_cl.key;
      ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
      error_log           /var/log/nginx/api_jonnattan.error.log;
      access_log          /var/log/nginx/api_jonnattan.access.log detail; 
      root                /var/www/html;
      index               index.html index.htm index.nginx-debian.html;

      error_page 500 502 503 504 /error.html;      

      location /.well-known/pki-validation/7BBB279398C353841283F7492DFCE164.txt {
        root /var/www/html;
        index .well-known/pki-validation/7BBB279398C353841283F7492DFCE164.txt;
      }

      location = /error.html {
            root /var/www/html;
            internal;
      }

      location = /favicon.ico {
        root /var/www/html/jonnattan;
      }

      location ^~ /status {
        proxy_pass_request_headers          on;
        proxy_pass  http://api-jonnattan:8085/status;
      }

      location ^~ /mobile {
        proxy_pass_request_headers          on;
        proxy_pass  http://api-jonnattan:8085/mobile;
      }

      location /cxp {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-jonnattan:8085/cxp;
      }

      location /email {
        proxy_pass_request_headers        on;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass  http://api-email:8070/email;
      }

      location /llm {
        proxy_pass_request_headers        on;
        proxy_set_header Host             $host;
        proxy_set_header X-Real-IP        $remote_addr;
        proxy_set_header X-Forwarded-For  $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass  http://llm-api:8090/llm;
      }

      location /zlr {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-jonnattan:8085/zlr;
      }
      
      location ^~ /docs {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-docs:8095/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /checkall {
        proxy_pass_request_headers on;
        proxy_pass  http://api-jonnattan:8085/checkall;
      }

      location ^~ /geo {
        proxy_pass_request_headers on;
        proxy_pass  http://api-geo:8075/geo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /edr {
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_read_timeout 65s;
        proxy_connect_timeout 5s;
        proxy_send_timeout 65s;
        proxy_pass http://api-jonnattan:8085/edr;
      }

      location ^~ /scraper {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-scraper:8090/scraper;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /notification {
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://api-notification:8060/notification;
      }

      location ^~ /page {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-jonnattan:8085/page;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP  $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /waza {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-jonnattan:8085/waza;
      }
}

server {
      listen 443          ssl;
      listen [::]:443     ssl;
      server_name         www.jonnattan.cl;
      ssl_certificate     /etc/ssl/api_jonnattan_cl.crt;
      ssl_certificate_key /etc/ssl/api_jonnattan_cl.key;
      ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
      error_log           /var/log/nginx/jonnattan_cl.error.log;
      access_log          /var/log/nginx/jonnattan_cl.access.log detail; 
      root                /var/www/html;
      index               index.html index.htm index.nginx-debian.html;

      error_page          500 502 503 504 /error.html;      

      location /.well-known/pki-validation/7BBB279398C353841283F7492DFCE164.txt {
        root /var/www/html;
        index .well-known/pki-validation/7BBB279398C353841283F7492DFCE164.txt;
      }

      location = /error.html {
            root /var/www/html;
            internal;
      }

      location = /favicon.ico {
        root /var/www/html/jonnattan;
      }

      location / {
        proxy_pass_request_headers  on;
        proxy_pass                  http://web-site:8080/;
        proxy_set_header            Host $host;
        proxy_set_header            X-Real-IP  $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto https;
        proxy_set_header            X-Forwarded-Host $host;
        proxy_cache_bypass          $http_secret_header;
        add_header                  X-Cache-Status $upstream_cache_status;
      }

      location /ws {
        proxy_pass http://web-site:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400; # O un valor adecuado para WebSockets
    }

}