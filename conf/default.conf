      }

      #location /static {
      #  proxy_pass  http://logia-server:58085/static;
      #}

      ######################## Maquina windows ################################
      # llega a dev.jonnattan.com con /prestashop pero entra al server
      # sin la palabra prestashop. el servidor es la maq windows
      location ^~ /prestashop/ {
        proxy_pass_request_headers on;
