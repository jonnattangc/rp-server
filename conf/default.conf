# Configuración de servidores de esta maquina. Actualmente son 3 dominios

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name  dev.jonnattan.com;

    error_log           /var/log/nginx/dev_jonnattan_com.error.log;
    access_log          /var/log/nginx/dev_jonnattan_com.access.log detail; 

    root                /var/www/html;
    index               index.html index.htm index.nginx-debian.html;

    error_page 500 502 503 504 /error.html;

    location /.well-known/pki-validation/97482E1E60E631B7E1BE55829F8EF6E0.txt {
      root /var/www/html;
      index .well-known/pki-validation/97482E1E60E631B7E1BE55829F8EF6E0.txt;
    }

    location = /error.html {
      root /var/www/html;
      internal;
    }

    location = /favicon.ico {
      root /var/www/html/jonnattan;
    }

    location ^~ /sitio_mtto.png {
      root /var/www/html;
      index /sitio_mtto.png;
      proxy_cache_bypass $http_secret_header;
      add_header X-Cache-Status $upstream_cache_status;
    }

    location /py {
      root  /var/www/html;
      index index.html index.htm index.nginx-debian.html;
    }

    ######################  WEB ################################
    
    location / {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8055/;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP  $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header            X-Forwarded-Proto https;
      proxy_set_header            X-Forwarded-Host $host;
      proxy_cache_bypass          $http_secret_header;
      add_header                  X-Cache-Status $upstream_cache_status;
    }

    location /ws {
      proxy_pass                  http://mini.jonnattan:8055;
      proxy_http_version          1.1;
      proxy_set_header            Upgrade $http_upgrade;
      proxy_set_header            Connection "upgrade";
      proxy_set_header            Host $host;
      proxy_cache_bypass          $http_upgrade;
      proxy_read_timeout          86400; # O un valor adecuado para WebSockets
    }

    location /privacity {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8085/privacity;
    }

    location /terms {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8085/terms;
    }

    location ^~ /page {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8085/page;
      proxy_set_header            Host $host;
      proxy_set_header            X-Real-IP $remote_addr;
      proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header            X-Forwarded-Proto https;
      proxy_set_header            X-Forwarded-Host $host;
      client_max_body_size        8M;
    }

    location ^~ /dreams {
      proxy_pass_request_headers  on;
      proxy_pass                  http://mini.jonnattan:8085/dreams;
    }

    location /email {
      proxy_pass_request_headers        on;
      proxy_set_header                  Host $host;
      proxy_set_header                  X-Real-IP $remote_addr;
      proxy_set_header                  X-Forwarded-For $proxy_add_x_forwarded_for;
      proxy_set_header                  X-Forwarded-Proto https;
      proxy_set_header                  X-Forwarded-Host $host;
      proxy_pass                        http://mini.jonnattan:8070/email;
    }

    location /llm {
      proxy_pass_request_headers        on;
      proxy_set_header                  Host $host;
