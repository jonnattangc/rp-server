# Configuración de servidores de esta maquina. Actualmente son 3 dominios

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name  dev.jonnattan.com;
    return 301 https://$host$request_uri;

    #location /.well-known/pki-validation/829D664A77B285312119909DDF485B32.txt {
    #  root /var/www/html;
    #  index .well-known/pki-validation/829D664A77B285312119909DDF485B32.txt;
    #}

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name logia.buenaventuracadiz.cl;
    return 301 https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
    listen 80;
    listen [::]:80;
    server_name  api.jonnattan.cl;
    return 301 https://$host$request_uri;

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
      listen 443          ssl;
      listen [::]:443     ssl;
      server_name         api.jonnattan.cl;
      ssl_certificate     /etc/ssl/ssl_api_jonnattan_certificate.crt;
      ssl_certificate_key /etc/ssl/ssl_api_jonnattan_cl_key.key;
      ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
      error_log           /var/log/nginx/api_jonnattan.error.log;
      access_log          /var/log/nginx/api_jonnattan.access.log; 
      root                /var/www/html;
      index               index.html index.htm index.nginx-debian.html;

      error_page 500 502 503 504 /error.html;      

      location = /error.html {
            root /var/www/html;
            internal;
      }

      location = /favicon.ico {
        root /var/www/html/jonnattan;
      }

      location /cxp {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-jonnattan:8085/cxp;
      }

      location /zlr {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-jonnattan:8085/zlr;
      }
      
      location ^~ /docs {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-docs:8095/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /checkall {
        proxy_pass_request_headers on;
        proxy_pass  http://api-jonnattan:8085/checkall;
      }

      location ^~ /geo {
        proxy_pass_request_headers on;
        proxy_pass  http://api-geo:8075/geo;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /edr {
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://mac-pro-litle:8089/emulator;
      }

      location ^~ /scraper {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-scraper:8090/scraper;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

      location ^~ /notification {
        proxy_pass_request_headers on;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        proxy_pass http://api-notification:8060/notification;
      }
}

