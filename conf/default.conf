server {
      listen 443          ssl default_server;
      listen [::]:443     ssl default_server;
      server_name         dev.jonnattan.com;
      ssl_certificate     /etc/ssl/ssl_jonnattan_certificate.crt;
      ssl_certificate_key /etc/ssl/ssl_jonnattan_certificate_key.key;
      ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
      error_log           /var/log/nginx/jonnattan.error.log;
      access_log          /var/log/nginx/jonnattan.access.log; 
      root                /var/www/html;
      index               index.html index.htm index.nginx-debian.html;

      # En caso de matenimiento tipicamente aparece el error bad wategay http 502
      # y cuando se baja el contenedor del website automaticamente se muestra esto
      error_page 500 502 503 504 /error.html;

      #location /.well-known/pki-validation/829D664A77B285312119909DDF485B32.txt {
      #  root /var/www/html;
      #  index .well-known/pki-validation/829D664A77B285312119909DDF485B32.txt;
      #}

      location = /error.html {
        root /var/www/html;
        internal;
      }

      location = /favicon.ico {
        root /var/www/html/jonnattan;
      }

      location ^~ /sitio_mtto.png {
        root /var/www/html;
        index /sitio_mtto.png;
        proxy_cache_bypass $http_secret_header;
        add_header X-Cache-Status $upstream_cache_status;
      }

      location /py {
        root  /var/www/html;
        index index.html index.htm index.nginx-debian.html;
      }

      ######################  WEB ################################
      
      location / {
        proxy_pass_request_headers  on;
        proxy_pass                  http://web-site:8080/;
        proxy_set_header            Host $host;
        proxy_set_header            X-Real-IP  $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto https;
        proxy_set_header            X-Forwarded-Host $host;
        proxy_cache_bypass          $http_secret_header;
        add_header                  X-Cache-Status $upstream_cache_status;
      }

      location /ws {
        proxy_pass http://web-site:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400; # O un valor adecuado para WebSockets
    }

