user www-data;
worker_processes auto;
pid /run/nginx.pid;
include /etc/nginx/modules-enabled/*.conf;

events {
        worker_connections 768;
}

http {
        real_ip_header X-Forwarded-For;
        sendfile on;
        tcp_nopush on;
        proxy_ssl_server_name on;
        types_hash_max_size 2048;
        large_client_header_buffers 4 16m;
        client_max_body_size 100M;

        include /etc/nginx/mime.types;
        default_type application/octet-stream;

        ssl_protocols TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
        ssl_prefer_server_ciphers on;

        log_format detail '[$remote_addr] [$time_local] [Time: $request_time ms] | $remote_user "$request" [STATUS: $status] '
                    '"AGENT: $http_user_agent" "$http_x_forwarded_for" "AUTH: [$http_authorization]" '
                    '"Origen: [$http_Access_Control_Allow_Origin]" "HOST: [$http_host]" "PAIS: [$http_CF_IPCountry]" "[LEN BODY: $body_bytes_sent]" "BODY: [$request_body]" ';

        gzip on;
        include /etc/nginx/conf.d/*.conf;
        include /etc/nginx/sites-enabled/*;
}
