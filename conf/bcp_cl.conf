# Configuración de servidores de esta maquina. Actualmente son 3 dominios
server {
    listen 80;
    listen [::]:80;
    server_name logia.buenaventuracadiz.cl;
    return 301 https://$host$request_uri;

    location /.well-known/pki-validation/82E80EC6DA9017210B584222F575CF5E.txt {
      root /var/www/html;
      index .well-known/pki-validation/82E80EC6DA9017210B584222F575CF5E.txt;
    }

    location / {
      try_files $uri $uri/ =404;
    }
}

server {
      listen 443          ssl;
      listen [::]:443     ssl;
      server_name         logia.buenaventuracadiz.cl;
      ssl_certificate     /etc/ssl/ssl_logia.crt;
      ssl_certificate_key /etc/ssl/ssl_logia.key;
      ssl_protocols       TLSv1 TLSv1.1 TLSv1.2 TLSv1.3;
      error_log           /var/log/nginx/logia.error.log;
      access_log          /var/log/nginx/logia.access.log detail; 
      root                /var/www/html;
      index               index.html index.htm index.nginx-debian.html;

      error_page 500 502 503 504 /error.html;

      location /.well-known/pki-validation/82E80EC6DA9017210B584222F575CF5E.txt {
          root /var/www/html;
          index .well-known/pki-validation/82E80EC6DA9017210B584222F575CF5E.txt;
      }

      location = /error.html {
            root /var/www/html;
            internal;
      }

      location = /favicon.ico {
        root /var/www/html/logia;
      }

      location ^~ /sitio_mtto.png {
        root /var/www/html;
        index /sitio_mtto.png;
        proxy_cache_bypass      $http_secret_header;
        add_header              X-Cache-Status $upstream_cache_status;
      }
      
      ######################  WEB ################################
      location ^~ / {
        proxy_pass_request_headers  on;
        proxy_pass                  http://logia-server:58085;
        proxy_set_header            Host $host;
        proxy_set_header            X-Real-IP  $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto https;
        proxy_set_header            X-Forwarded-Host $host;
        proxy_cache_bypass          $http_secret_header;
        add_header                  X-Cache-Status $upstream_cache_status;
      }

      location ^~ /bcp {
        proxy_pass                  http://logia-server:58085/bcp;
        proxy_pass_request_headers  on;
        proxy_set_header            Host $host;
        proxy_set_header            X-Real-IP  $remote_addr;
        proxy_set_header            X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header            X-Forwarded-Proto https;
        proxy_set_header            X-Forwarded-Host $host;
      }

      location ^~ /docs {
        proxy_pass_request_headers  on;
        proxy_pass  http://api-docs:8095/docs;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header X-Forwarded-Host $host;
        client_max_body_size 8M;
      }

}

