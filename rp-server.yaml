apiVersion: apps/v1
kind: Deployment
metadata:
  name: rp-nginx
spec:
  replicas: 2 
  selector:
    matchLabels:
      app: web-proxy
  template:
    metadata:
      labels:
        app: web-proxy
    spec:
      containers:
      - name: nginx
        image: jonnattangc/rp-nginx:1.0.0
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        - containerPort: 443
---
apiVersion: v1
kind: Service
metadata:
  name: rp-nginx-service
spec:
  type: LoadBalancer
  selector:
    app: web-proxy
  ports:
    - name: http
      port: 80
      targetPort: 80
    - name: https
      port: 443
      targetPort: 443